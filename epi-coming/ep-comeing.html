<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episode Releasing Soon • DK STUDIO</title>

<style>
body{
    margin:0;
    height:100vh;
    background:radial-gradient(circle at top,#0b0c2a,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
}

.box{
    padding:30px;
    animation:fade 1s ease-in-out;
}

h1{
    color:#4da6ff;
    font-size:32px;
    margin-bottom:10px;
}

p{
    color:#bbb;
    margin-bottom:25px;
}

.countdown{
    font-size:28px;
    letter-spacing:2px;
    margin:20px 0;
    color:#4da6ff;
    font-weight:bold;
}

.btn{
    margin-top:25px;
    display:inline-block;
    padding:12px 26px;
    background:#4da6ff;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#2d8cff;
    transform:scale(1.05);
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="box">
    <h1>Episode 3 Releasing Soon 🎬</h1>
    <p>Release Date: <b>30 March</b><br>Please wait until launch!</p>

    <div class="countdown" id="timer">Loading...</div>

    <a href="../episodes/WAITING FOR A LOVE THAT NEVER CAME.HTML" class="btn">⬅ Back to Home</a>
</div>

<script>
// 🔥 SET RELEASE DATE HERE
const releaseDate = new Date("March 30, 2026 00:00:00").getTime();

const timer = document.getElementById("timer");

setInterval(() => {
    const now = new Date().getTime();
    const gap = releaseDate - now;

    if(gap <= 0){
        timer.innerHTML = "Episode is Live Now! 🎉";
        return;
    }

    const days = Math.floor(gap / (1000*60*60*24));
    const hours = Math.floor((gap % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((gap % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((gap % (1000*60)) / 1000);

    timer.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
},1000);
</script>

</body>
</html>
