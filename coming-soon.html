<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon • DK STUDIO</title>

<style>
body{
    margin:0;
    height:100vh;
    background:radial-gradient(circle at top, #0b0c2a, #000);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

.box{
    animation:fadeIn 1s ease-in-out;
}

.logo{
    font-size:60px;
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

h1{
    color:#4da6ff;
    margin-bottom:10px;
    font-size:30px;
}

p{
    color:#bbb;
    font-size:16px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 26px;
    background:#4da6ff;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#2d8cff;
    transform:scale(1.05);
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="box">
    <div class="logo">🎬</div>
    <h1>Anime Series Coming Soon</h1>
    <p>This series is under production.<br>Stay tuned on DK STUDIO ✨</p>

    <a href="anime-series.html" class="btn">⬅ Back to Home</a>
</div>

</body>
</html>
