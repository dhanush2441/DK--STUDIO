<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕Waiting for a Love That Never Came - DK STUDIO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0b0c2a;
    color: white;
}

header {
    background: black;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: #7b5cff;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
    justify-content: center;
}

.card {
    width: 180px;
    height: 260px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s;
    text-decoration: none;
    color: white;
    background: #1c1f4a;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card span {
    background: rgba(0,0,0,0.6);
    text-align: center;
    padding: 6px;
    font-size: 14px;
}
.episode-header {
  text-align: center;
  margin-top: 40px;
}

.episode-title {
  font-size: 32px;
  color: white;
  margin-bottom: 20px;
}

/* Back Button Center */
.back-btn {
  display: inline-block;
  padding: 12px 24px;
  font-size: 18px;
  color: #fff;
  background: linear-gradient(45deg, #ff0040, #ff7b00);
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.4s ease;
  
  /* Rolling animation */
  animation: rollIn 1s ease forwards;
}

/* Hover Glow */
.back-btn:hover {
  transform: scale(1.1) rotate(-3deg);
  box-shadow: 0 0 15px #ff0040, 0 0 25px #ff7b00;
}

/* Rolling Animation Keyframes */
@keyframes rollIn {
  0% {
    opacity: 0;
    transform: translateY(80px) rotate(180deg) scale(0.5);
  }
  100% {
    opacity: 1;
    transform: translateY(0) rotate(0deg) scale(1);
  }
}
</style>
</head>

<body>

<header>💕Waiting for a Love That Never Came Episodes</header>

<div class="episode-header">
  <h1 class="episode-title"></h1>

  <a href="../anime-series.html" class="back-btn">
    ⬅ Back to Episodes
  </a>
</div>

<div class="grid">

    <a href="../video-player/waiting for a love that never came ep1.html" class="card">
        <img src="../images/ep1.jpeg" alt="Episode 1">
        <span>Episode 1</span>
    </a>

    <a href="../video-player/waiting for a love that never came ep2.html" class="card">
        <img src="../images/ep2.jpeg" alt="Episode 2">
        <span>Episode 2</span>
    </a>

    <a href="../epi-coming/ep-comeing.html" class="card">
        <img src="../images/ep3.jpeg" alt="Episode 3">
        <span>Episode 3</span>
    </a>

</div>

</body>
</html>
