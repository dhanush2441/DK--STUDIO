<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK STUDIO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0b0c2a;
    color: white;
}

header {
    background: black;
    padding: 15px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #7b5cff;
}

.section {
    padding: 20px;
}

.section h2 {
    margin-bottom: 10px;
}

.grid {
    display: flex;
    gap: 15px;
    overflow-x: auto;
}

.card {
    min-width: 150px;
    height: 220px;
    background: #1c1f4a;
    border-radius: 10px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card span {
    background: rgba(0,0,0,0.6);
    width: 100%;
    text-align: center;
    padding: 5px;
    border-radius: 0 0 10px 10px;
}
.go-anime-btn {
    background: linear-gradient(45deg, #7b5cff, #00c3ff);
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(123,92,255,0.6);
}

.go-anime-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(0,195,255,0.9);
}
</style>
</head>

<body>

<header>🎞️ DK STUDIO</header>

<!-- Anime Series -->
<div class="section">
    <h2>Anime Series</h2>
    <a href="anime-series.html">
    <button class="go-anime-btn">Go to Anime Series 🎬</button>
</a>
</div>

<!-- Movies -->
<div class="section">
    <h2>Anime Movies</h2>
       <a href="anime-movies.html">
    <button class="go-anime-btn">Go to Movies 🎥</button>
</a>
</div>

<!-- Lyrics Videos -->
<div class="section">
    <h2>Lyrics Videos</h2>
    <a href="lyrics.html">
    <button class="go-anime-btn">Go to Music 🎵</button>
</a>
</div>

<!-- Manga -->
<div class="section">
    <h2>Manga</h2>
    <a href="manga.html">
    <button class="go-anime-btn">Go to Manga 📖</button>
</a>
</div>

</body>
</html>
